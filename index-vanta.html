<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Sebas - links</title>
  <link rel="stylesheet" href="./index.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      VANTA.BIRDS({
        el: "#vanta",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00
      })
    })
  </script>
</head>

<body>
  <div id="vanta"></div>
  <main>
    <header>
      <img src="./images/bg-2.jpg" />
      <h1>@sebas</h1>
    </header>
    <ul>
      <li>
        <a href="https://www.sebas.io/">
          <img src="./images/homepage.svg" alt="Homepage" width="20" />
          Official Website
        </a>
      </li>
      <li><a href="">
          <img src="./images/youtube.svg" alt="Youtube" width="20" />
          Youtube
        </a>
      </li>
      <li><a href="https://x.com/KDazmi">
          <img src="./images/twitter.svg" alt="Twitter" width="20" />
          Twitter
        </a>
      </li>
      <li><a href="https://github.com/Kise07">
          <img src="./images/github.svg" alt="Github" width="20" />
          Github
        </a></li>
    </ul>
  </main>
</body>

</html>
